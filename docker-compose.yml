services:
  db:
    image: postgres:16
    container_name: tokenix-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tokenix
    ports:
      - "5432:5432"
    volumes:
      - tokenix_pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tokenix
      RPC_URL: http://hardhat:8545
      CONTRACT_ADDRESS: 0x5FbDB2315678afecb367f032d93F642f64180aa3
      JWT_SECRET: super_secret_change_me
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src/abi:/app/src/abi
    depends_on:
      - db
      - hardhat

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  hardhat:
    build:
      context: ./blockchain
    container_name: tokenix-hardhat
    # Run the script via the shell so execution permission is not required on the
    # mounted file (Windows mounts can remove the +x bit). This executes the
    # script's contents with `sh` and does not depend on the file's executable flag.
    command: ["sh", "/app/entrypoint.sh"]
    ports:
      - "8545:8545"
    volumes:
      - ./backend/src/abi:/backend/src/abi
      - ./frontend/src/abi:/frontend/src/abi
      - ./blockchain/entrypoint.sh:/app/entrypoint.sh:ro

volumes:
  tokenix_pgdata:
