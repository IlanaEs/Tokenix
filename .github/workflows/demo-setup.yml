name: Demo Setup (deterministic)

# Enforces the deterministic-demo blocker automatically: from a clean checkout
# on a clean Docker host, `./scripts/demo-setup.sh` must bring the stack up,
# auto-deploy + sync, seed, and verify the 100 TNX baseline end-to-end. If it
# fails, the PR is blocked. Scope is limited to this flow only.

on:
  pull_request:
    branches: [main]
  push:
    branches: [fix/deterministic-demo-setup]

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: demo-setup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo-setup:
    name: Clean demo setup must pass
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (clean)
        uses: actions/checkout@v4

      - name: Show Docker / Compose versions
        run: |
          docker version
          docker compose version

      - name: Run deterministic demo setup
        # The script runs `docker compose down -v` first, builds and starts the
        # stack, waits for Hardhat to auto-deploy + sync ABIs, seeds, and verifies
        # users / funding-readiness rows / CONFIRMED transfers / 100 TNX balances.
        # It exits non-zero on any failed check, which fails this job.
        run: ./scripts/demo-setup.sh

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200 || true

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans || true
